[phases.setup]
nixPkgs = ["nodejs_20", "python311", "gcc"]

[phases.frontend]
cmds = ["cd frontend && npm install && npm run build"]

[phases.install]
cmds = ["cd backend && pip install -r requirements.txt"]

[start]
cmd = "cd backend && python -m uvicorn app.main:app --host 0.0.0.0 --port ${PORT:-8000}"
